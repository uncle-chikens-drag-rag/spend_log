<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spend Log</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+JP:wght@400;500;700&display=swap"
        rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        google: {
                            blue: '#1a73e8',
                            blueHover: '#174ea6',
                            blueLight: '#e8f0fe',
                            green: '#34a853',
                            greenLight: '#e6f4ea',
                            orange: '#f9ab00',
                            orangeLight: '#fef7e0',
                            red: '#ea4335',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', '"Noto Sans JP"', 'sans-serif'],
                        mono: ['ui-monospace', 'SFMono-Regular', 'Menlo', 'Monaco', 'Consolas', '"Liberation Mono"', '"Courier New"', 'monospace'],
                    },
                }
            }
        }
    </script>
    <!-- PapaParse for CSV parsing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <!-- Encoding.js for Shift-JIS detection and conversion -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/encoding-japanese/2.0.0/encoding.min.js"></script>

    <link rel="stylesheet" href="style.css">
</head>

<body class="min-h-screen p-2 sm:p-6 font-sans antialiased selection:bg-blue-100 selection:text-blue-900">

    <div class="max-w-5xl mx-auto flex flex-col h-[calc(100dvh-1rem)] sm:h-[calc(100vh-3rem)]">

        <!-- Header area -->
        <header class="mb-4 sm:mb-6 flex flex-col md:flex-row md:items-center justify-between gap-3 sm:gap-4">
            <div class="flex items-center gap-3">
                <!-- App Icon Placeholder (Blue Circle) -->
                <div
                    class="w-10 h-10 rounded-full bg-google-blue flex items-center justify-center text-white shadow-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2"
                        stroke="currentColor" class="w-6 h-6">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M12 6v12m-3-2.818l.879.659c1.171.879 3.07.879 4.242 0 1.172-.879 1.172-2.303 0-3.182C13.536 12.219 12.768 12 12 12c-.725 0-1.45-.22-2.003-.659-1.106-.879-1.106-2.303 0-3.182s2.9-.879 4.006 0l.415.33M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                </div>
                <h1 class="text-2xl font-semibold tracking-tight text-gray-800">Spend Log</h1>
            </div>

            <div class="flex items-center gap-3">
                <!-- Hidden native input, triggered by label button -->
                <input type="file" id="csv-file" accept=".csv" class="hidden">
                <!-- Filename display -->
                <span id="file-name-display"
                    class="hidden text-xs text-gray-500 bg-gray-100 px-3 py-1.5 rounded-full max-w-[180px] truncate"
                    title=""></span>
                <label for="csv-file"
                    class="cursor-pointer inline-flex items-center gap-1.5 px-4 py-1.5 rounded-full text-sm font-medium text-white shadow-sm transition-all select-none"
                    style="background:#1a73e8" onmouseenter="this.style.background='#174ea6'"
                    onmouseleave="this.style.background='#1a73e8'">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2"
                        stroke="currentColor" class="w-4 h-4">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5" />
                    </svg>
                    Choose CSV
                </label>
            </div>
        </header>

        <!-- Main Content Card -->
        <div
            class="flex-1 flex flex-col bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden relative">

            <!-- Summary & Controls (Inside Card) -->
            <div class="flex flex-col sm:flex-row sm:items-center justify-between p-4 sm:p-5 border-b border-gray-100 bg-white z-20 gap-4 sm:gap-0">
                <div class="flex flex-wrap items-center gap-4 sm:gap-6">
                    <!-- Monthly Total (always fixed) -->
                    <div class="flex flex-col">
                        <span class="text-[10px] sm:text-xs font-semibold tracking-widest uppercase mb-1" style="color:#1a73e8">Monthly
                            Total</span>
                        <span id="total-amount" class="text-2xl sm:text-3xl tracking-tight text-gray-800 font-semibold"
                            style="font-feature-settings: 'tnum';">¥0</span>
                    </div>
                    <!-- Filtered Total (only shown when filter active) -->
                    <div id="filtered-total-area" class="hidden flex items-center gap-3 sm:gap-4 pl-4 sm:pl-5 border-l border-gray-200">
                        <!-- Label + amount -->
                        <div class="flex flex-col">
                            <span class="text-[10px] sm:text-xs font-semibold tracking-widest uppercase mb-1"
                                style="color:#f9ab00">Filtered</span>
                            <span id="filtered-amount" class="text-xl sm:text-2xl tracking-tight font-semibold"
                                style="font-feature-settings: 'tnum'; color:#f9ab00;">¥0</span>
                        </div>
                        <!-- Progress bar -->
                        <div class="flex flex-col gap-1 sm:gap-1.5">
                            <div class="w-16 sm:w-24 h-1.5 sm:h-2 rounded-full" style="background:#e5e7eb;overflow:hidden;">
                                <div id="filter-share-bar"
                                    style="height:100%;width:0%;background:#f9ab00;border-radius:9999px;transition:width 0.4s cubic-bezier(0.4,0,0.2,1);">
                                </div>
                            </div>
                            <span id="filter-share-pct" class="text-[10px] sm:text-xs font-semibold" style="color:#f9ab00;">0%</span>
                        </div>
                    </div>
                </div>

                <div class="flex items-center justify-end w-full sm:w-auto mt-1 sm:mt-0">
                    <div id="filter-indicator"
                        class="hidden mr-auto sm:mr-6 flex items-center gap-1.5 sm:gap-2 bg-google-orangeLight px-2 sm:px-3 py-1 sm:py-1.5 rounded-full border border-yellow-200 text-google-orange"
                        style="color:#f9ab00;background-color:#fef7e0;border-color:#fde68a">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2"
                            stroke="currentColor" class="w-3.5 h-3.5 sm:w-4 sm:h-4">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M12 3c2.755 0 5.455.232 8.083.678.533.09.917.556.917 1.096v1.044a2.25 2.25 0 01-.659 1.591l-5.432 5.432a2.25 2.25 0 00-.659 1.591v2.927a2.25 2.25 0 01-1.244 2.013L9.75 21v-6.568a2.25 2.25 0 00-.659-1.591L3.659 7.409A2.25 2.25 0 013 5.818V4.774c0-.54.384-1.006.917-1.096A48.32 48.32 0 0112 3z" />
                        </svg>
                        <span id="filter-name" class="text-xs sm:text-sm font-medium truncate max-w-[100px] sm:max-w-[150px]"></span>
                        <button id="clear-filter" class="ml-1 p-0.5 rounded-full transition-colors focus:outline-none"
                            style="color:#f9ab00" onmouseenter="this.style.backgroundColor='#fde68a'"
                            onmouseleave="this.style.backgroundColor='transparent'" title="Clear Filter">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor"
                                class="w-3.5 h-3.5 sm:w-4 sm:h-4">
                                <path
                                    d="M6.28 5.22a.75.75 0 00-1.06 1.06L8.94 10l-3.72 3.72a.75.75 0 101.06 1.06L10 11.06l3.72 3.72a.75.75 0 101.06-1.06L11.06 10l3.72-3.72a.75.75 0 00-1.06-1.06L10 8.94 6.28 5.22z" />
                            </svg>
                        </button>
                    </div>

                    <div class="flex flex-col items-end">
                        <span class="text-[10px] sm:text-xs font-semibold tracking-widest uppercase mb-0 sm:mb-0.5"
                            style="color:#34a853">Items</span>
                        <span id="row-count" class="text-lg sm:text-xl font-semibold leading-none sm:leading-normal" style="color:#34a853">0</span>
                    </div>
                </div>
            </div>

            <!-- Table Container -->
            <div class="flex-1 overflow-auto rounded-b-2xl">
                <table class="w-full text-left text-sm" style="table-layout:fixed">
                    <thead class="sticky top-0 bg-white border-b border-gray-200 z-10">
                        <tr class="text-gray-600">
                            <th class="px-3 py-3 sm:px-5 sm:py-4 cursor-pointer hover:text-gray-900 transition-colors select-none group font-semibold w-[70px] sm:w-[110px] text-xs sm:text-sm"
                                onclick="sortData('date')">
                                <div class="flex items-center gap-1 sm:gap-1.5">
                                    Date
                                    <span class="text-gray-400 group-hover:text-gray-600 w-3 inline-block text-[10px] sm:text-xs"
                                        id="sort-icon-date"></span>
                                </div>
                            </th>
                            <th class="px-3 py-3 sm:px-5 sm:py-4 cursor-pointer hover:text-gray-900 transition-colors select-none group font-semibold w-auto text-xs sm:text-sm"
                                onclick="sortData('store')">
                                <div class="flex items-center gap-1 sm:gap-1.5">
                                    Store
                                    <span class="text-gray-400 group-hover:text-gray-600 w-3 inline-block text-[10px] sm:text-xs"
                                        id="sort-icon-store"></span>
                                </div>
                            </th>
                            <th class="px-2 py-3 sm:px-5 sm:py-4 font-semibold text-gray-500 w-[22%] sm:w-[25%]">
                            </th>
                            <th class="px-3 py-3 sm:px-5 sm:py-4 cursor-pointer hover:text-gray-900 transition-colors select-none group text-right font-semibold w-[95px] sm:w-[140px] text-xs sm:text-sm"
                                onclick="sortData('amount')">
                                <div class="flex items-center justify-end gap-1 sm:gap-1.5">
                                    Amount
                                    <span class="text-gray-400 group-hover:text-gray-600 w-3 inline-block text-[10px] sm:text-xs"
                                        id="sort-icon-amount"></span>
                                </div>
                            </th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="divide-y divide-gray-100 text-gray-700">
                        <!-- Placeholder row before loading -->
                        <tr>
                            <td colspan="4" class="px-6 py-16 text-center text-gray-400 text-sm">
                                <div class="flex flex-col items-center gap-2">
                                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                                        stroke-width="1.5" stroke="currentColor" class="w-8 h-8 opacity-50">
                                        <path stroke-linecap="round" stroke-linejoin="round"
                                            d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m2.25 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z" />
                                    </svg>
                                    Please select a CSV file to load transactions.
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Floating Selection Counter -->
    <div id="selection-float" class="hidden" style="position:fixed;bottom:28px;right:28px;z-index:50;">
        <div
            style="background:white;border-radius:16px;box-shadow:0 8px 32px rgba(60,64,67,0.20),0 2px 8px rgba(60,64,67,0.10);padding:14px 20px;display:flex;align-items:center;gap:16px;min-width:240px;">
            <div style="flex:1;">
                <div
                    style="font-size:0.65rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:#1a73e8;margin-bottom:2px;">
                    Selected</div>
                <div id="sel-amount"
                    style="font-size:1.4rem;font-weight:700;color:#202124;font-feature-settings:'tnum';">¥0</div>
                <div id="sel-count" style="font-size:0.75rem;color:#80868b;margin-top:1px;">0 items</div>
            </div>
            <button onclick="clearSelection()"
                style="width:32px;height:32px;border-radius:50%;border:none;background:#f1f3f4;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#5f6368;transition:background 0.2s;"
                onmouseenter="this.style.background='#e8eaed'" onmouseleave="this.style.background='#f1f3f4'"
                title="Clear selection">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor"
                    style="width:16px;height:16px;">
                    <path
                        d="M6.28 5.22a.75.75 0 00-1.06 1.06L8.94 10l-3.72 3.72a.75.75 0 101.06 1.06L10 11.06l3.72 3.72a.75.75 0 101.06-1.06L11.06 10l3.72-3.72a.75.75 0 00-1.06-1.06L10 8.94 6.28 5.22z" />
                </svg>
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
